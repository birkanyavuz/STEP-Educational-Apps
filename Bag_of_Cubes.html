  }

  }
  #pull-btn:active { transform: scale(0.95); }
  
  #current-pull { 
    min-height: 160px; 
    margin: 20px auto; 
    font-size: 28px; 
    font-weight: bold; 
  }
  
  .cube { 
    width: 60px; 
    height: 60px; 
    display: inline-block; 
    margin: 10px; 
    border-radius: 8px; 
    border: 3px solid #333; 
    box-sizing: border-box;
  }
  
  .red { background: #ff4c4c; }
  .yellow { background: #ffd700; }
  .blue { background: #4169e1; }
  
  #pulled-area { 
    display: flex; 
    flex-wrap: wrap; 
    justify-content: center; 
    width: 860px; 
    max-width: 100%; 
    margin: 0 auto; 
    border: 4px dashed #ccc; 
    padding: 20px; 
    min-height: 150px; 
    background: white; 
    box-sizing: border-box; 
    border-radius: 15px;
  }
</style>
