<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STEP Academy Portal</title>
    <script src="config.js"></script>
    <style>
        /* All the colorful styles we used before go here */
        body { font-family: 'Comic Sans MS', sans-serif; text-align: center; background: #e0f7fa; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .btn { background: white; border: 4px solid #00838f; border-radius: 20px; padding: 30px; width: 220px; cursor: pointer; font-size: 1.5rem; text-decoration: none; color: #00838f; font-weight: bold; }
        .btn:hover { background: #00838f; color: white; }
        .back-btn { background: #ffb300; color: white; padding: 10px 20px; border-radius: 10px; display: inline-block; margin-bottom: 20px; text-decoration: none; }
    </style>
</head>
<body>
    <h1 id="title">🏫 STEP Academy App Portal</h1>
    <div id="navigation"></div>
    <div id="app-grid" class="grid"></div>

    <script>
        const nav = document.getElementById('navigation');
        const grid = document.getElementById('app-grid');
        const title = document.getElementById('title');

        function showGrades() {
            nav.innerHTML = '';
            grid.innerHTML = '';
            title.innerText = "🏫 STEP Academy App Portal";
            schoolConfig.grades.forEach(grade => {
                const btn = document.createElement('div');
                btn.className = 'btn';
                btn.innerText = "🎒 " + grade;
                btn.onclick = () => showSubjects(grade);
                grid.appendChild(btn);
            });
        }

        function showSubjects(grade) {
            nav.innerHTML = `<a href="#" class="back-btn" onclick="showGrades()">⬅️ Back to School</a>`;
            grid.innerHTML = '';
            title.innerText = grade + " Folders";
            schoolConfig.subjects.forEach(subject => {
                const btn = document.createElement('div');
                btn.className = 'btn';
                btn.innerText = "📁 " + subject;
                btn.onclick = () => showApps(grade, subject);
                grid.appendChild(btn);
            });
        }

        function showApps(grade, subject) {
            nav.innerHTML = `<a href="#" class="back-btn" onclick="showSubjects('${grade}')">⬅️ Back to ${grade}</a>`;
            grid.innerHTML = '';
            title.innerText = grade + " " + subject;
            const key = `${grade}-${subject}`;
            const apps = schoolConfig.apps[key] || [];
            
            if (apps.length === 0) {
                grid.innerHTML = "<p>Coming soon!</p>";
            } else {
                apps.forEach(app => {
                    const a = document.createElement('a');
                    a.className = 'btn';
                    a.href = app.url;
                    a.innerText = app.icon + " " + app.name;
                    grid.appendChild(a);
                });
            }
        }

        showGrades(); // Start at the homepage
    </script>
</body>
</html>
