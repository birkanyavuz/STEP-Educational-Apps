<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Learning Apps</title>
<style>
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
    background-color: #e0f7fa;
    color: #333;
    text-align: center;
    padding: 40px 20px;
    margin: 0;
  }
  .header { margin-bottom: 40px; }
  h1 { color: #00838f; font-size: 3.5rem; margin: 0; }
  p { font-size: 1.3rem; color: #555; }
  
  .grade-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 25px;
    justify-content: center;
    max-width: 900px;
    margin: auto;
  }
  .grade-button {
    background-color: white;
    border: 5px solid #00838f;
    border-radius: 20px;
    padding: 40px 20px;
    width: 250px;
    text-decoration: none;
    color: #00838f;
    font-size: 1.8rem;
    font-weight: bold;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: transform 0.2s, background-color 0.2s, color 0.2s;
  }
  .grade-button:hover {
    transform: translateY(-5px);
    background-color: #00838f;
    color: white;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>🏫 Academy App Portal</h1>
    <p>Select your grade level to find your games!</p>
  </div>

  <div class="grade-grid">
    <a href="2nd_grade.html" class="grade-button">🖍️ 2nd Grade</a>
    <a href="3rd_grade.html" class="grade-button">🎒 3rd Grade</a>
    <a href="6th_grade.html" class="grade-button">🔬 6th Grade</a>
    <a href="7th_grade.html" class="grade-button">📐 7th Grade</a>
  </div>

</body>
</html>
