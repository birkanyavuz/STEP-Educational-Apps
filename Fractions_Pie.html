<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Visualizer</title>
<style>
  body { 
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
    text-align: center; 
    background: #f3e5f5; 
    padding: 20px; 
    color: #333;
  }
  .container { 
    background: white; 
    border-radius: 20px; 
    padding: 40px; 
    max-width: 800px; 
    margin: auto; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
    border: 5px solid #9c27b0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  /* Layout for chart and fraction side-by-side */
  .display-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 80px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  /* Pie Chart Styling */
  .pie-container {
    position: relative;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    border: 4px solid #333;
    box-sizing: border-box;
    overflow: hidden; /* Keeps the pie perfectly round */
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }

  /* Crisp lines overlay for the slices */
  .spoke {
    position: absolute;
    top: 0;
    left: calc(50% - 2px); 
    width: 4px;
    height: 50%; 
    background-color: #333;
    transform-origin: bottom center;
  }

  /* Fraction Styling */
  .fraction-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 8rem;
    font-weight: bold;
    color: #9c27b0;
    line-height: 1;
    width: 250px; /* <--- THE FIX: Locks the width so the pie stops moving! */
  }
  .numerator {
    border-bottom: 8px solid #333;
    padding: 0 20px;
    margin-bottom: 10px;
  }
  .denominator {
    padding: 0 20px;
  }

  /* Control Buttons */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    background: #fafafa;
    padding: 20px;
    border-radius: 15px;
    border: 2px dashed #ccc;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .control-group h3 {
    margin: 0;
    color: #555;
    font-size: 1.5rem;
  }
  .btn-row {
    display: flex;
    gap: 15px;
  }
  button {
    font-size: 2rem;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    transition: transform 0.1s, background-color 0.2s;
  }
  button:active { transform: scale(0.9); }
  button:disabled { background-color: #ccc !important; cursor: not-allowed; transform: none; }
  
  .btn-minus { background-color: #f44336; }
  .btn-plus { background-color: #4caf50; }
  .btn-minus:hover:not(:disabled) { background-color: #d32f2f; }
  .btn-plus:hover:not(:disabled) { background-color: #388e3c; }

</style>
</head>
<body>

  <div class="container">
    
    <div class="display-area">
      <div class="pie-container" id="pieChart"></div>

      <div class="fraction-display">
        <div class="numerator" id="numDisplay">1</div>
        <div class="denominator" id="denDisplay">4</div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <h3>Top (Numerator)</h3>
        <p style="margin: 0; font-size: 0.9rem; color: #777;">How many pieces we have</p>
        <div class="btn-row">
          <button class="btn-minus" id="btnNumMinus" onclick="changeNumerator(-1)">-</button>
          <button class="btn-plus" id="btnNumPlus" onclick="changeNumerator(1)">+</button>
        </div>
      </div>

      <div class="control-group">
        <h3>Bottom (Denominator)</h3>
        <p style="margin: 0; font-size: 0.9rem; color: #777;">Total pieces in the pie</p>
        <div class="btn-row">
          <button class="btn-minus" id="btnDenMinus" onclick="changeDenominator(-1)">-</button>
          <button class="btn-plus" id="btnDenPlus" onclick="changeDenominator(1)">+</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    let numerator = 1;
    let denominator = 4;
    const MAX_DENOMINATOR = 12;

    function updateVisuals() {
      document.getElementById('numDisplay').innerText = numerator;
      document.getElementById('denDisplay').innerText = denominator;

      let pie = document.getElementById('pieChart');
      let percentage = (numerator / denominator) * 100;
      
      pie.style.background = `conic-gradient(#ff9800 0% ${percentage}%, #e0e0e0 ${percentage}% 100%)`;
      pie.innerHTML = '';

      if (denominator > 1) {
        let stepDeg = 360 / denominator;
        for (let i = 0; i < denominator; i++) {
          let spoke = document.createElement('div');
          spoke.className = 'spoke';
          spoke.style.transform = `rotate(${i * stepDeg}deg)`;
          pie.appendChild(spoke);
        }
      }

      document.getElementById('btnNumMinus').disabled = (numerator <= 0);
      document.getElementById('btnNumPlus').disabled = (numerator >= denominator);
      
      document.getElementById('btnDenMinus').disabled = (denominator <= 1);
      document.getElementById('btnDenPlus').disabled = (denominator >= MAX_DENOMINATOR);
    }

    function changeNumerator(amount) {
      numerator += amount;
      if (numerator < 0) numerator = 0;
      if (numerator > denominator) numerator = denominator;
      updateVisuals();
    }

    function changeDenominator(amount) {
      denominator += amount;
      if (denominator < 1) denominator = 1;
      if (denominator > MAX_DENOMINATOR) denominator = MAX_DENOMINATOR;
      if (numerator > denominator) numerator = denominator;
      updateVisuals();
    }

    updateVisuals();
  </script>
</body>
</html>
