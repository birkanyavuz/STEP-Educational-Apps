<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7th Grade Apps</title>
<style>
  body {
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
    background-color: #fff8e1; 
    color: #333;
    text-align: center;
    padding: 30px 20px;
    margin: 0;
  }
  .header { margin-bottom: 30px; }
  h1 { color: #f57f17; font-size: 3rem; margin: 0; margin-bottom: 15px;}
  
  .back-btn {
    display: inline-block;
    background-color: #ffb300;
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 1.2rem;
    margin-bottom: 30px;
    transition: transform 0.1s;
  }
  .back-btn:hover { transform: scale(1.05); }

  .app-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    max-width: 900px;
    margin: auto;
  }
  
  /* This is what your app buttons will look like */
  .app-button {
    background-color: white;
    border: 4px solid #f57f17;
    border-radius: 20px;
    padding: 30px 20px;
    width: 250px;
    text-decoration: none;
    color: #f57f17;
    font-size: 1.5rem;
    font-weight: bold;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    transition: transform 0.2s, background-color 0.2s, color 0.2s;
  }
  .app-button:hover {
    transform: translateY(-5px);
    background-color: #f57f17;
    color: white;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>🎒 7th Grade Apps</h1>
    <a href="index.html" class="back-btn">⬅️ Back to Home</a>
  </div>

  <div class="app-grid">
    <p style="font-size: 1.5rem; color: #888; width: 100%;">More apps coming soon!</p>
  </div>

</body>
</html>
